name: CI для системы тестирования знаний

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout код
      uses: actions/checkout@v4

    - name: Установить Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Установить зависимости Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Линтинг (flake8)
      run: |
        flake8 module_a_questions.py module_b_checking.py --max-line-length=120 --ignore=E501,W503

    - name: Запуск модульных тестов
      run: python test_modules.py

    - name: Установить Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Установить зависимости для модуля В
      run: |
        cd result-service
        npm install
        cd ..

    - name: Запуск всех трёх модулей и проверка их работы
      run: |
        # Запускаем модули в фоне
        python module_a_questions.py &
        python module_b_checking.py &
        cd result-service
        node module_c_results.js &
        cd ..
        # Ждём поднятия серверов
        sleep 10
        # Проверяем каждый модуль
        curl --fail http://localhost:5001/tests/active
        curl --fail http://localhost:5002/docs
        curl --fail http://localhost:3000/results/1
        echo "CI успешно завершён"
      shell: bash

name: CI для системы тестирования знаний

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout код
      uses: actions/checkout@v4

    - name: Установить Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Установить зависимости Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Установить Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Установить зависимости для модуля В
      run: |
        cd result-service
        npm install
        cd ..

    - name: Запустить модули (фон)
      run: |
        python module_a_questions.py &
        python module_b_checking.py &
        cd result-service
        node module_c_results.js &
        cd ..
        sleep 10

    - name: Запуск unit-тестов
      run: pytest tests/unit -v

    - name: Запуск интеграционных тестов
      run: pytest tests/integration -v

    - name: Запуск E2E тестов
      run: pytest tests/e2e -v
      continue-on-error: true

    - name: Остановить модули
      if: always()
      run: |
        pkill -f "python module_a_questions.py" || true
        pkill -f "uvicorn" || true
        pkill -f "node module_c_results.js" || true
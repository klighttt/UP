<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система тестирования знаний</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
        }
        .status span {
            display: inline-block;
            padding: 5px 12px;
            margin: 0 5px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status .online { background: #4caf50; color: white; }
        .status .offline { background: #f44336; color: white; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h3 { margin-top: 0; color: #1a1a2e; }
        .question {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .question-title {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .option {
            margin: 10px 0;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .option:hover { background: #e9ecef; }
        .option.selected { background: #2196f3; color: white; }
        .option.correct-highlight {
            background: #4caf50;
            color: white;
        }
        .option.wrong-highlight {
            background: #f44336;
            color: white;
        }
        button {
            background: #2196f3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #1976d2; }
        .result { font-size: 18px; font-weight: bold; }
        .passed { color: #4caf50; }
        .failed { color: #f44336; }
        .analytics { display: flex; gap: 20px; flex-wrap: wrap; }
        .analytic-card {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }
        details {
            margin-top: 15px;
        }
        summary {
            cursor: pointer;
            font-weight: bold;
            color: #2196f3;
        }
        pre {
            background: #1a1a2e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Система тестирования знаний</h1>
        
        <div class="status" id="status">
            <span id="moduleA_status" class="offline">Модуль А (5001): проверка...</span>
            <span id="moduleB_status" class="offline">Модуль Б (5002): проверка...</span>
            <span id="moduleC_status" class="offline">Модуль В (3000): проверка...</span>
        </div>

        <div class="card" id="testInfo">
            <h3>Загрузка теста...</h3>
        </div>

        <div class="card" id="questionsPanel" style="display:none;">
            <h3>Вопросы теста</h3>
            <div id="questionsContainer"></div>
            <button onclick="submitAnswers()">Отправить ответы</button>
        </div>

        <div class="card" id="resultPanel" style="display:none;">
            <h3>Результат тестирования</h3>
            <div id="resultContainer"></div>
        </div>

        <div class="card" id="analyticsPanel" style="display:none;">
            <h3>Аналитика по тесту</h3>
            <div id="analyticsContainer"></div>
        </div>
    </div>

    <script>
        const MODULE_A = 'http://localhost:5001';
        const MODULE_B = 'http://localhost:5002';
        const MODULE_C = 'http://localhost:3000';

        let currentTest = null;
        let currentQuestions = [];
        let userAnswers = {};
        let showResultsMode = false;
        let lastResultData = null;

        async function checkStatus() {
            try {
                const res = await fetch(`${MODULE_A}/tests/active`);
                if (res.ok) document.getElementById('moduleA_status').innerHTML = 'Модуль А (5001): онлайн';
                else throw new Error();
            } catch(e) {
                document.getElementById('moduleA_status').innerHTML = 'Модуль А (5001): офлайн';
            }

            try {
                const res = await fetch(`${MODULE_B}/docs`);
                if (res.ok) document.getElementById('moduleB_status').innerHTML = 'Модуль Б (5002): онлайн';
                else throw new Error();
            } catch(e) {
                document.getElementById('moduleB_status').innerHTML = 'Модуль Б (5002): офлайн';
            }

            try {
                const res = await fetch(`${MODULE_C}/results/1`);
                if (res.ok) document.getElementById('moduleC_status').innerHTML = 'Модуль В (3000): онлайн';
                else throw new Error();
            } catch(e) {
                document.getElementById('moduleC_status').innerHTML = 'Модуль В (3000): офлайн';
            }
        }

        async function loadTest() {
            showResultsMode = false;
            userAnswers = {};
            
            try {
                const testRes = await fetch(`${MODULE_A}/tests/active`);
                currentTest = await testRes.json();
                
                document.getElementById('testInfo').innerHTML = `
                    <h3>${currentTest.title}</h3>
                    <p>${currentTest.description}</p>
                    <p>Время: ${currentTest.timeLimitMinutes} мин | Макс. балл: ${currentTest.maxScore}</p>
                `;

                const questionsRes = await fetch(`${MODULE_A}/tests/${currentTest.id}/questions`);
                currentQuestions = await questionsRes.json();
                
                renderQuestions();
                document.getElementById('questionsPanel').style.display = 'block';
                document.getElementById('resultPanel').style.display = 'none';
                
                loadAnalytics();
            } catch(e) {
                document.getElementById('testInfo').innerHTML = `<h3>Ошибка загрузки: ${e.message}</h3>`;
            }
        }

        function getCorrectAnswerForQuestion(questionId) {
            const correctMap = {
                1: "Объектно-ориентированное программирование",
                2: "#",
                3: "tuple",
                4: "print()",
                5: "Сравнение на равенство",
                6: "while",
                7: "Интерфейс программирования приложений",
                8: "GET",
                9: "Structured Query Language",
                10: "80"
            };
            return correctMap[questionId];
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            currentQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.id = `question-${q.id}`;
                questionDiv.innerHTML = `<div class="question-title">${index + 1}. ${q.text}</div>`;
                
                const correctAnswerText = getCorrectAnswerForQuestion(q.id);
                
                q.options.forEach(opt => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'option';
                    optDiv.textContent = opt;
                    optDiv.setAttribute('data-value', opt);
                    
                    if (!showResultsMode) {
                        optDiv.onclick = () => {
                            questionDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                            optDiv.classList.add('selected');
                            userAnswers[q.id] = opt;
                        };
                    } else {
                        if (opt === correctAnswerText) {
                            optDiv.classList.add('correct-highlight');
                        }
                        if (userAnswers[q.id] === opt && userAnswers[q.id] !== correctAnswerText) {
                            optDiv.classList.add('wrong-highlight');
                        }
                    }
                    
                    questionDiv.appendChild(optDiv);
                });
                container.appendChild(questionDiv);
            });
        }

        async function submitAnswers() {
            if (Object.keys(userAnswers).length !== currentQuestions.length) {
                alert(`Ответьте на все вопросы! (Отвечено: ${Object.keys(userAnswers).length} из ${currentQuestions.length})`);
                return;
            }

            const answersList = Object.entries(userAnswers).map(([qId, answer]) => ({
                questionId: parseInt(qId),
                selectedOption: answer
            }));

            const payload = {
                userId: 1,
                answers: answersList
            };

            try {
                const checkRes = await fetch(`${MODULE_B}/tests/${currentTest.id}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await checkRes.json();

                await fetch(`${MODULE_C}/results/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(result)
                });

                lastResultData = result;
                showResultsMode = true;
                
                renderQuestions();
                
                displayResult(result);
                
                loadAnalytics();
                
            } catch(e) {
                alert(`Ошибка: ${e.message}`);
            }
        }

        function displayResult(result) {
            document.getElementById('resultPanel').style.display = 'block';
            
            document.getElementById('resultContainer').innerHTML = `
                <div class="result ${result.passed ? 'passed' : 'failed'}">
                    ${result.passed ? 'ТЕСТ ПРОЙДЕН' : 'ТЕСТ НЕ ПРОЙДЕН'}
                </div>
                <p>Баллы: ${result.score} / ${result.maxScore}</p>
                <p>Процент: ${result.percentage}%</p>
                <p>Дата: ${new Date(result.completedAt).toLocaleString()}</p>
                <button onclick="resetTest()">Пройти тест заново</button>
            `;
        }

        function resetTest() {
            showResultsMode = false;
            userAnswers = {};
            renderQuestions();
            document.getElementById('resultPanel').style.display = 'none';
        }

        async function loadAnalytics() {
            try {
                const analyticsRes = await fetch(`${MODULE_C}/analytics/test/${currentTest?.id || 1}`);
                const analytics = await analyticsRes.json();
                
                document.getElementById('analyticsPanel').style.display = 'block';
                document.getElementById('analyticsContainer').innerHTML = `
                    <div class="analytics">
                        <div class="analytic-card">
                            <h4>Средний балл</h4>
                            <div style="font-size: 28px;">${analytics.averageScore}</div>
                        </div>
                        <div class="analytic-card">
                            <h4>Проходной балл</h4>
                            <div style="font-size: 28px;">${analytics.passRate}%</div>
                        </div>
                        <div class="analytic-card">
                            <h4>Попыток</h4>
                            <div style="font-size: 28px;">${analytics.attemptsCount}</div>
                        </div>
                    </div>
                    <details>
                        <summary>Распределение баллов</summary>
                        <pre>${JSON.stringify(analytics.scoreDistribution, null, 2)}</pre>
                    </details>
                `;
            } catch(e) {
                console.error('Аналитика не доступна:', e);
            }
        }

        checkStatus();
        setTimeout(() => loadTest(), 1000);
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
